## LibreChat ##

k8s_librechat_namespace: librechat
k8s_librechat_chart_version: 0.8.4

# pwgen -s 32 1 | tr -d '\n' | ansible-vault encrypt_string
env_librechat_creds_key: "<encrypted>"
env_librechat_creds_iv: "<encrypted>"
env_librechat_jwt_secret: "<encrypted>"
env_librechat_jwt_refresh_secret: "<encrypted>"
env_librechat_meili_master_key: "<encrypted>"

k8s_librechat_environment_variables:
  # See https://www.librechat.ai/docs/configuration/dotenv
  CREDS_KEY: "{{ env_librechat_creds_key }}"
  CREDS_IV: "{{ env_librechat_creds_iv }}"
  JWT_SECRET: "{{ env_librechat_jwt_secret }}"
  JWT_REFRESH_SECRET: "{{ env_librechat_jwt_refresh_secret }}"
  MEILI_MASTER_KEY: "{{ env_librechat_meili_master_key }}"
  APP_TITLE: "NC Voter Data Assistant"
  CUSTOM_FOOTER: ""
  ALLOW_EMAIL_LOGIN: "true"
  ALLOW_REGISTRATION: "false"
  ALLOW_PASSWORD_RESET: "true"

# librechat.yaml configuration: https://www.librechat.ai/docs/configuration/librechat_yaml
base_librechat_config:
  version: 1.3.7
  cache: true
  interface:
    customWelcome: "Welcome to the NC Voter Data Assistant! How can I help you today?"
    presets: false
    multiConvo: false
    marketplace:
      use: false
  endpoints:
    custom:
      - name: "ncpollbook-agent"
        baseURL: "http://ncpollbook.ncpollbook.svc.cluster.local/v1"
        apiKey: "django-api-key"
        models:
          default: ["voter-agent"]
          fetch: true
        titleConvo: true
        modelDisplayLabel: "NC Voter Data Agent"

k8s_librechat_release_values:
  librechat:
    existingSecretName: librechat-credentials-env
    configEnv:
      APP_TITLE: "NC Voter Data Assistant"
      CUSTOM_FOOTER: ""
      ALLOW_EMAIL_LOGIN: "true"
      ALLOW_REGISTRATION: "false"
      ALLOW_PASSWORD_RESET: "true"
    configYamlContent: "{{ base_librechat_config | to_yaml(sort_keys=False) }}"
  updateStrategy:
    type: Recreate
  podAnnotations:
    checksum/secrets: "{{ k8s_librechat_environment_variables | to_json(sort_keys=True) | hash('sha256') }}"
  ingress:
    enabled: true
    className: traefik
    hosts:
      - host: "{{ k8s_librechat_hostname }}"
        paths:
          - path: /
            pathType: Prefix

