---
- hosts: k8s_vms
  become: yes
  tags: microk8s
  tasks:
    - name: Create directory for MicroK8s config
      ansible.builtin.file:
        path: /var/snap/microk8s/common
        state: directory
        mode: "0755"

    - name: Set MicroK8s default config
      ansible.builtin.template:
        src: templates/microk8s.default.yaml
        dest: /var/snap/microk8s/common/.microk8s.yaml
        mode: "0644"

    - name: Install MicroK8s
      snap:
        name: microk8s
        classic: yes
        channel: "{{ microk8s_channel }}"

    - name: Creates .kube directory
      ansible.builtin.file:
        path: .kube
        state: directory
      delegate_to: localhost
      become: false

    - name: microk8s kubeconfig
      run_once: true
      block:
        - name: Retrieve the client config
          ansible.builtin.command:
            cmd: microk8s config --use-loopback
          register: kube_conf

        - name: Create local kubeconfig
          ansible.builtin.copy:
            content: "{{ kube_conf.stdout | replace('127.0.0.1', ansible_facts['hostname']) }}"
            dest: ".kube/config-ncpollbook"
            mode: 0600
          delegate_to: localhost
          become: false

- hosts: k8s_api
  tags: cloudflared
  gather_facts: false
  tasks:
    # https://github.com/canonical/microk8s/issues/4864
    - name: Apply Cloudflared Helm chart
      kubernetes.core.helm:
        # context: "{{ k8s_context|mandatory }}"
        # kubeconfig: "{{ k8s_kubeconfig }}"
        chart_repo_url: https://community-charts.github.io/helm-charts
        chart_ref: cloudflared
        chart_version: "{{ k8s_cloudflare_chart_version }}"
        create_namespace: yes
        release_name: "cloudflared"
        release_namespace: "{{ k8s_cloudflare_namespace }}"
        release_values: "{{ k8s_cloudflare_release_values }}"
        wait: yes

    - name: Apply httpbin Helm chart
      kubernetes.core.helm:
        # context: "{{ k8s_context|mandatory }}"
        # kubeconfig: "{{ k8s_kubeconfig }}"
        chart_repo_url: https://matheusfm.dev/charts
        chart_ref: httpbin
        release_name: "httpbin"
        release_namespace: "{{ k8s_cloudflare_namespace }}"
        wait: yes

- hosts: k8s_api
  tags: tailscale
  gather_facts: false
  tasks:
    - name: Apply Tailscale Operator Helm chart
      kubernetes.core.helm:
        chart_repo_url: https://pkgs.tailscale.com/helmcharts
        chart_ref: tailscale-operator
        chart_version: "{{ k8s_tailscale_chart_version }}"
        create_namespace: yes
        release_name: "tailscale-operator"
        release_namespace: "{{ k8s_tailscale_namespace }}"
        release_values: "{{ k8s_tailscale_release_values }}"
        wait: yes

    - name: Apply Traefik Helm chart
      kubernetes.core.helm:
        chart_repo_url: https://traefik.github.io/charts
        chart_ref: traefik
        chart_version: "{{ k8s_traefik_chart_version }}"
        create_namespace: yes
        release_name: "traefik"
        release_namespace: "{{ k8s_traefik_namespace }}"
        release_values: "{{ k8s_traefik_release_values }}"
        wait: yes

    - name: Create Tailscale Funnel for Traefik service
      kubernetes.core.k8s:
        definition:
          # https://tailscale.com/docs/features/kubernetes-operator/how-to/cluster-ingress#exposing-a-service-to-the-public-internet-using-ingress-and-tailscale-funnel
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: tailscale-funnel-ing
            namespace: "{{ k8s_traefik_namespace }}"
            annotations:
              tailscale.com/funnel: "true"
          spec:
            defaultBackend:
              service:
                name: traefik
                port:
                  number: 80
            ingressClassName: tailscale
            tls:
              - hosts:
                  - traefik
        wait: yes

    - name: Apply whoami Helm chart
      kubernetes.core.helm:
        chart_repo_url: https://cowboysysop.github.io/charts/
        chart_ref: whoami
        create_namespace: yes
        release_name: whoami
        release_namespace: "{{ k8s_whoami_namespace }}"
        release_values: "{{ k8s_whoami_release_values }}"
        wait: yes
