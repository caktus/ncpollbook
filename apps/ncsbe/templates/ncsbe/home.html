{% extends "ncsbe/base.html" %}

{% block title %}NC Poll Book — Home{% endblock %}

{% block content %}
<div class="hero bg-base-200 rounded-box p-8 mb-8">
  <div class="hero-content text-center">
    <div>
      <h1 class="text-4xl font-bold mb-2">NC Voter Registration</h1>
      <p class="text-base-content/70">Search by county or click a county on the map.</p>
    </div>
  </div>
</div>

<div class="flex justify-center mb-8">
  <form method="get" action="/" class="flex gap-2">
    <input
      type="text"
      name="county_name"
      placeholder="County name (e.g. DURHAM)"
      class="input input-bordered w-64"
      value="{{ form.county_name.value|default:'' }}"
    />
    <button type="submit" class="btn btn-primary">Search</button>
    {% if form.errors %}
    <span class="text-error self-center text-sm">{{ form.county_name.errors.0 }}</span>
    {% endif %}
  </form>
</div>

<div class="flex justify-center">
  {% include "ncsbe/partials/nc_map.html" %}
</div>
{% endblock %}
